<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#cc0033">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Coordinator OS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Coordinator OS">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/app-icon.svg">
<title>Rutgers Gameday Gameplan</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="native-backdrop" aria-hidden="true"></div>
<header class="gameday-header">
  <div class="header-top">
    <div>
      <div id="programLabel" class="eyebrow">Rutgers Football</div>
      <h1 id="appTitle">Gameday Gameplan</h1>
      <div id="weekOpponent" class="header-sub">Loading weekly package</div>
    </div>
    <div class="logo" aria-label="Rutgers">R</div>
  </div>
  <div class="header-stats" aria-label="Team status">
    <div><span>Record</span><strong id="seasonRecord">Loading</strong></div>
    <div><span>Rutgers</span><strong id="rutgersRank">Loading</strong></div>
    <div><span>Offense</span><strong id="offenseRank">Loading</strong></div>
    <div><span>Defense</span><strong id="defenseRank">Loading</strong></div>
  </div>
  <div id="momentumStatus" class="momentum">Loading package</div>
</header>

<main class="app-shell">
  <section id="gameplan" class="tab active" aria-label="Gameplan tab">
    <section id="gameplanHome" class="panel home-dashboard-panel"></section>
  </section>

  <section id="topplays" class="tab panel" aria-label="Top plays tab">
    <div class="section-heading">
      <p>Top Plays</p>
      <strong>Adjusted rankings</strong>
    </div>
    <div class="filter-grid">
      <label>Concept
        <select id="rankFamily"><option value="all">All</option></select>
      </label>
      <label>Formation
        <select id="rankFormation"><option value="all">All</option></select>
      </label>
    </div>
    <input id="search" placeholder="Search play, formation, or player">
    <div id="rankList"></div>
  </section>

  <section id="personnel" class="tab panel" aria-label="Personnel tab">
    <div class="section-heading">
      <p>Personnel &amp; Matchups</p>
      <strong>Shared roster and weekly fits</strong>
    </div>
    <div id="rosterList"></div>
    <div id="usageList"></div>
    <div id="lineAnalysis"></div>
    <div id="runDirectionList"></div>
    <div id="protectionList"></div>
    <div id="opponentDefenseList"></div>
    <div id="matchupMatrix"></div>
  </section>

  <section id="recruiting" class="tab panel" aria-label="Recruiting tab">
    <div class="section-heading">
      <p>Recruiting</p>
      <strong>Board workspace</strong>
    </div>
    <div id="recruitingOverview"></div>
    <div id="teamNeedsList"></div>
    <div id="priorityList"></div>
    <div id="recruitingFilters" class="filter-grid"></div>
    <div id="recruitList"></div>
    <div id="recruitDetail"></div>
    <div id="actionPlanList"></div>
  </section>

  <section id="more" class="tab panel" aria-label="More tab">
    <div class="section-heading">
      <p>More</p>
      <strong>Packages</strong>
    </div>
    <div id="enginePackagePanel"></div>
    <div id="dataStatus" class="small"></div>
    <div id="moreList"></div>
  </section>
</main>

<nav class="bottom-nav" aria-label="Primary">
  <button data-tab="gameplan" class="active">Gameplan</button>
  <button data-tab="topplays">Top Plays</button>
  <button data-tab="personnel">Personnel</button>
  <button data-tab="recruiting">Recruiting</button>
  <button data-tab="more">More</button>
</nav>

<noscript>
  <main class="noscript">
    <section class="panel best-call-card">
      <div class="card-label">Static Phone Fallback</div>
      <h2>Rutgers Gameday Gameplan</h2>
      <p>Enable JavaScript to load the current weekly opponent package, verified roster, recruiting board, play art, and recommendation engine.</p>
    </section>
    <section class="panel">
      <h2>Opening 12</h2>
      <ol>
        <li>Inside Zone Split - Pistol</li>
        <li>HB Dive - Pistol</li>
        <li>RPO Read Zone Bubbles - Shotgun</li>
        <li>Y Stick - Pistol</li>
        <li>Counter - Pistol</li>
        <li>PA Boot Slide - Pistol</li>
        <li>PA FL Counter Y Screen - Pistol</li>
        <li>Power O - Goal Line Offense</li>
        <li>TE Attack - Pistol</li>
        <li>HB Sting - Goal Line Offense</li>
        <li>Mesh Spot - Shotgun</li>
        <li>PA Y Seam - Pistol</li>
      </ol>
    </section>
    <section class="panel">
      <h2>Weekly Package</h2>
      <p>The JavaScript app reads the active opponent, scouting notes, personnel, matchups, and recruiting data from the local JSON package files.</p>
    </section>
  </main>
</noscript>
<script src="data/rutgers_team.js"></script>
<script src="data/rutgers_playbook.js"></script>
<script src="data/weekly_plan.js"></script>
<script src="data/game_history.js"></script>
<script src="data/recruiting_data.js"></script>
<script src="data/engine_data.js"></script>
<script src="data/depth_chart_seed.js"></script>
<script src="data/phase1_verified_data.js"></script>
<script src="data/player_media.js"></script>
<script src="data/card_registry.js"></script>
<script src="data/weekly/coaching_decisions.js"></script>
<script src="data/weekly/run_lane_analysis.js"></script>
<script src="data/weekly/weekly_matchup_summary.js"></script>
<script src="data/video_verified/rutgers_season_stats.js"></script>
<script src="data/video_verified/purdue_season_stats.js"></script>
<script src="data/video_verified/purdue_roster.js"></script>
<script src="data/video_verified/four_star_freshman_class.js"></script>
<script src="data/video_verified/rutgers_prospect_board.js"></script>
<script src="data/video_verified/rutgers_roster_recovery.js"></script>
<script src="data/video_verified/purdue_roster_recovery.js"></script>
<script src="data/video_verified/rutgers_board_scouting_recovery.js"></script>
<script src="data/video_verified/video_evidence_index.js"></script>
<script src="app.js?v=sprint2_5_correction2c"></script>
</body>
</html>
