<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#cc0033">
<title>Rutgers Interactive Call Sheet</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div>
    <div class="eyebrow">RUTGERS FOOTBALL</div>
    <h1>Interactive Call Sheet</h1>
    <div id="matchupLine" class="sub"></div>
  </div>
  <div class="logo">R</div>
</header>

<main>
  <section class="panel compact">
    <div class="grid two">
      <label>Down
        <select id="down">
          <option value="1">1st</option><option value="2">2nd</option>
          <option value="3">3rd</option><option value="4">4th</option>
        </select>
      </label>
      <label>Distance
        <select id="distance">
          <option value="short">Short (1–3)</option>
          <option value="medium" selected>Medium (4–6)</option>
          <option value="long">Long (7+)</option>
        </select>
      </label>
      <label>Field Zone
        <select id="zone">
          <option value="normal" selected>Open Field</option>
          <option value="backed_up">Backed Up</option>
          <option value="fringe">Red-Zone Fringe</option>
          <option value="red_zone">Red Zone</option>
          <option value="goal_line">Goal Line</option>
        </select>
      </label>
      <label>Game State
        <select id="state">
          <option value="normal" selected>Normal</option>
          <option value="two_minute">Two Minute</option>
          <option value="protect_lead">Protect Lead</option>
          <option value="must_score">Must Score</option>
        </select>
      </label>
    </div>
    <button id="bestBtn" class="primary">CALL BEST PLAY</button>
    <button id="top3Btn">SHOW TOP 3</button>
  </section>

  <section class="panel compact tools">
    <button id="exportBtn">EXPORT WEEKLY JSON</button>
    <label class="fileTool">IMPORT WEEKLY JSON
      <input id="importWeekly" type="file" accept="application/json,.json">
    </label>
    <div id="dataStatus" class="small"></div>
  </section>

  <section id="recommendation" class="panel hero"></section>

  <nav class="tabs">
    <button data-tab="rankings" class="active">Rankings</button>
    <button data-tab="script">Opening 12</button>
    <button data-tab="matchup">Matchup</button>
    <button data-tab="usage">Usage</button>
  </nav>

  <section id="rankings" class="tab active panel">
    <input id="search" placeholder="Search play or formation">
    <div id="rankList"></div>
  </section>

  <section id="script" class="tab panel"><div id="scriptList"></div></section>
  <section id="matchup" class="tab panel"><div id="traitList"></div></section>
  <section id="usage" class="tab panel"><div id="usageList"></div></section>
</main>

<footer>Rutgers weekly data engine · Purdue week</footer>
<noscript>
  <main class="noscript">
    <section class="panel hero">
      <div class="meta">STATIC PHONE FALLBACK</div>
      <h2>Rutgers vs Purdue</h2>
      <p>Purdue record: 1-4. Use this static card when JavaScript is unavailable.</p>
    </section>
    <section class="panel">
      <h2>Opening 12</h2>
      <ol>
        <li>Inside Zone Split - Pistol</li>
        <li>HB Dive - Pistol</li>
        <li>RPO Read Zone Bubbles - Shotgun</li>
        <li>Y Stick - Pistol</li>
        <li>Counter - Pistol</li>
        <li>PA Boot Slide - Pistol</li>
        <li>PA FL Counter Y Screen - Pistol</li>
        <li>Power O - Goal Line Offense</li>
        <li>TE Attack - Pistol</li>
        <li>HB Sting - Goal Line Offense</li>
        <li>Mesh Spot - Shotgun</li>
        <li>PA Y Seam - Pistol</li>
      </ol>
    </section>
    <section class="panel">
      <h2>Purdue Traits</h2>
      <p><strong>Elite visible edge threat:</strong> REDG Q. Gillians - 84 OVR. Use quick game, screens, movement passes, chips and avoid consecutive slow-developing dropbacks.</p>
      <p><strong>Attackable defensive interior:</strong> DT group mostly low-to-mid 70s. Feature Inside Zone Split, HB Dive, Power O and Counter.</p>
      <p><strong>Average linebacker group:</strong> Linebackers mostly low 70s. Stress them with RPOs, Mesh, Y-Stick and play-action boots.</p>
    </section>
  </main>
</noscript>
<script src="data/rutgers_team.js"></script>
<script src="data/rutgers_playbook.js"></script>
<script src="data/weekly_plan.js"></script>
<script src="data/game_history.js"></script>
<script src="app.js"></script>
</body>
</html>
